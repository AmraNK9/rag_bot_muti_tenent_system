<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — PhyayPay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: #f1f5f9;
      padding: 24px;
      overflow: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(13,148,136,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: linear-gradient(135deg, rgba(30,41,59,0.8), rgba(15,23,42,0.9));
      border: 1px solid rgba(13,148,136,0.2);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(13,148,136,0.6), transparent);
    }

    .logo-wrap {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(13,148,136,0.2), rgba(16,185,129,0.1));
      border: 1px solid rgba(13,148,136,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .logo-wrap img {
      width: 52px;
      height: 52px;
      object-fit: contain;
    }

    .wifi-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      position: relative;
    }

    .wifi-icon svg {
      width: 56px;
      height: 56px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: #f1f5f9;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      color: #fca5a5;
      font-weight: 500;
      margin-bottom: 28px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #0d9488, #10b981);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
      box-shadow: 0 8px 24px rgba(13,148,136,0.3);
    }

    .retry-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px rgba(13,148,136,0.4);
    }

    .retry-btn:active {
      transform: translateY(0);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(13,148,136,0.2);
      margin: 24px auto;
    }

    .cached-info {
      font-size: 12px;
      color: #475569;
      line-height: 1.5;
    }

    .cached-info span {
      color: #0d9488;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Logo -->
    <div class="logo-wrap">
      <img src="/logo.png" alt="PhyayPay" />
    </div>

    <!-- WiFi off icon -->
    <div class="wifi-icon">
      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="28" cy="28" r="28" fill="rgba(239,68,68,0.08)"/>
        <path d="M10 20C15.5 14.5 22.3 12 28 12C33.7 12 40.5 14.5 46 20" stroke="rgba(239,68,68,0.2)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M15 26C19 22 23.5 20 28 20C32.5 20 37 22 41 26" stroke="rgba(239,68,68,0.35)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M20 32C22.8 29.5 25.3 28 28 28C30.7 28 33.2 29.5 36 32" stroke="#fca5a5" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="28" cy="39" r="3" fill="#ef4444"/>
        <line x1="12" y1="12" x2="44" y2="44" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Status -->
    <div class="status-badge">
      <div class="dot"></div>
      Internet connection မရှိပါ
    </div>

    <h1>Offline Mode</h1>
    <p class="subtitle">
      Network connection ပြတ်တောက်နေပါသည်။<br/>
      Connection ပြန်ရောက်မှ ဆက်လက်အသုံးပြုနိုင်မည်။
    </p>

    <button class="retry-btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
      ပြန်လည်ကြိုးစားပါ
    </button>

    <div class="divider"></div>

    <p class="cached-info">
      <span>PhyayPay PWA</span> — Cached content ကို<br/>
      offline ဖြင့် ကြည့်ရှုနိုင်ပါသည်
    </p>
  </div>

  <script>
    // Auto-retry when connection restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
