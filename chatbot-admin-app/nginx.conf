server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ─── PWA: Service Worker — cache မပြုလုပ်ရ (update ရရှိနိုင်ရန်) ───
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Service-Worker-Allowed "/";
        expires 0;
    }

    location = /workbox-*.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ─── PWA: Web App Manifest ───
    location = /manifest.webmanifest {
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "no-cache";
    }

    # ─── TWA: Digital Asset Links (assetlinks.json) ───
    location = /.well-known/assetlinks.json {
        add_header Content-Type "application/json";
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    # ─── PWA Icons — long cache ───
    location /pwa-icons/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── Static assets — long cache (hashed filenames) ───
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── SPA fallback ───
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ─── API proxy ───
    location /api/ {
        proxy_pass http://backend:4321/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── WebSocket ───
    location /socket.io/ {
        proxy_pass http://backend:4321/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # ─── Uploads ───
    location /uploads/ {
        proxy_pass http://backend:4321/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

